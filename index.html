<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Trusted Trade AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; } /* Fondo gris muy claro, casi blanco */
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .terminal-bg { background-color: #0f172a; } /* Fondo oscuro solo para la consola */
    </style>
</head>
<body class="text-slate-900 font-sans">

    <nav class="p-4 bg-white border-b border-slate-200 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="text-2xl font-black tracking-tighter text-blue-700">NEXUS<span class="text-slate-400">.AI</span></div>
        <div class="space-x-6 text-xs uppercase tracking-widest font-bold">
            <a href="#" class="text-blue-600">Dashboard</a>
            <a href="#" class="text-slate-500 hover:text-blue-600 transition">Auditoría</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-8 space-y-6">
            <div class="glass-card p-8 rounded-2xl">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2 text-slate-700">
                    <i class="fa-solid fa-file-invoice-dollar text-blue-600"></i> Nueva Transacción Segura
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Producto / Activo</label>
                        <input type="text" id="prod" value="Motor Siemens 5HP" class="w-full border border-slate-200 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Monto de Operación (USD)</label>
                        <input type="number" id="monto" value="5000" class="w-full border border-slate-200 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                    </div>
                </div>
                <button onclick="iniciarProceso()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-lg transition-all shadow-lg shadow-blue-200">
                    EJECUTAR CONTRATO INTELIGENTE
                </button>
            </div>

            <div class="terminal-bg rounded-2xl p-6 shadow-2xl">
                <div class="flex items-center gap-2 mb-4 border-b border-slate-800 pb-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="text-[10px] text-slate-500 font-mono ml-2 uppercase">Nexus Live Monitor</span>
                </div>
                <div id="log-container" class="h-48 overflow-y-auto font-mono text-sm text-blue-400 space-y-2">
                    <p class="text-slate-500">> Sistema en línea. Esperando instrucciones...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white border border-blue-100 p-8 rounded-2xl shadow-sm relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-5">
                    <i class="fa-solid fa-vault text-9xl text-blue-900"></i>
                </div>
                <h3 class="text-blue-600 font-bold mb-1 tracking-widest text-[10px] uppercase">Garantía Escrow</h3>
                <div class="text-5xl font-black mb-2 text-slate-900">$<span id="display-monto">0</span></div>
                <div class="flex items-center gap-2 text-green-600 text-[10px] font-bold uppercase">
                    <i class="fa-solid fa-shield-halved"></i> Fondos Asegurados
                </div>
                <div class="mt-6 pt-6 border-t border-slate-100">
                    <div class="flex justify-between text-xs">
                        <span class="text-slate-400 font-medium">Fee Nexus (4%):</span>
                        <span class="text-slate-900 font-bold" id="nexus-fee">$0</span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl bg-slate-50">
                <h3 class="text-slate-400 font-bold mb-3 tracking-widest text-[10px] uppercase">IA Judge Verdict</h3>
                <div id="veredicto-ia" class="text-xs text-slate-600 leading-relaxed">
                    <i class="fa-solid fa-circle-info text-blue-400 mr-1"></i> El sistema de arbitraje se activará automáticamente ante discrepancias en la entrega.
                </div>
            </div>
        </div>
    </div>

    <script>
        function iniciarProceso() {
            const log = document.getElementById('log-container');
            const monto = document.getElementById('monto').value;
            document.getElementById('display-monto').innerText = monto;
            document.getElementById('nexus-fee').innerText = "$" + (monto * 0.04).toFixed(2);

            const pasos = [
                "> [INFO] Analizando parámetros del contrato...",
                "> [OK] Verificando liquidez del Escrow...",
                "> [AUTH] Generando firma criptográfica SHA-256...",
                "> [MAIL] Legajo digital enviado a las partes.",
                "> [FINAL] Operación protegida por NEXUS AI."
            ];

            log.innerHTML = "";
            pasos.forEach((paso, i) => {
                setTimeout(() => {
                    log.innerHTML += `<p class='text-green-400 font-bold'>${paso}</p>`;
                    log.scrollTop = log.scrollHeight;
                }, i * 1000);
            });
        }
    </script>
</body>
</html>
