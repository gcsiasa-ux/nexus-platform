<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Marketplace | B2B AI Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .tab-active { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        .card-nexus { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: 0.3s; }
        .cursor-efecto::after { content: '|'; animation: parpadeo 0.7s infinite; color: #2563eb; margin-left: 2px; }
        @keyframes parpadeo { 50% { opacity: 0; } }
        
        /* Estilo para los carteles explicativos con Control de Usuario */
        #demo-guia {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            background: #1e293b;
            color: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border-left: 8px solid #fbbf24;
            display: none;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="demo-guia">
        <div class="mb-6">
            <i class="fa-solid fa-circle-info text-amber-400 text-3xl mb-3"></i>
            <p id="guia-texto" class="font-bold text-lg leading-relaxed"></p>
        </div>
        <button id="btn-continuar" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-black uppercase text-xs tracking-widest transition-all shadow-lg shadow-blue-900/20">
            Continuar <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
    </div>

    <nav class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-800 rounded-xl flex items-center justify-center text-white font-black text-xl">N</div>
            <div class="text-2xl font-black tracking-tighter uppercase">Nexus<span class="text-blue-700">.Market</span></div>
        </div>
        <button onclick="iniciarDemoGuiada()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest shadow-lg transition-all active:scale-95">
            <i class="fa-solid fa-play mr-2"></i> Iniciar Presentación
        </button>
    </nav>

    <div class="max-w-5xl mx-auto mt-8 flex gap-10 px-6 border-b border-slate-200">
        <button onclick="switchTab('comprar')" id="tab-comprar" class="tab-active pb-4 text-xs uppercase tracking-widest">Módulo Comprador</button>
        <button onclick="switchTab('vender')" id="tab-vender" class="pb-4 text-xs uppercase tracking-widest text-slate-400 font-bold">Módulo Vendedor</button>
    </div>

    <main class="max-w-5xl mx-auto p-6">
        <div id="view-comprar" class="space-y-8">
            <input type="text" id="main-search" placeholder="Buscar activos industriales..." class="w-full p-5 rounded-2xl border-none shadow-md text-lg outline-none bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card-nexus p-6">
                    <div class="h-40 bg-blue-50 rounded-2xl mb-4 flex items-center justify-center text-blue-400">
                        <i class="fa-solid fa-industry text-6xl"></i>
                    </div>
                    <h3 class="font-black text-xl">Motor Siemens 5HP Industrial</h3>
                    <p class="text-[10px] text-slate-400 mb-6 uppercase font-black tracking-widest">Activo Verificado por Nexus AI</p>
                    <div class="flex justify-between items-center border-t pt-4">
                        <span class="text-2xl font-black">$5.000</span>
                        <button onclick="abrirCheckout('Motor Siemens 5HP', 5000)" class="bg-blue-800 text-white px-5 py-2.5 rounded-xl font-black text-xs uppercase shadow-md transition-all active:scale-95">Comprar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-vender" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h2 class="text-lg font-black mb-6 uppercase text-blue-800 tracking-widest">KYC de Empresa Vendedora</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="vender-rs" placeholder="Razón Social" class="p-4 bg-slate-50 rounded-xl outline-none font-bold border">
                    <input type="text" id="vender-cuit" placeholder="CUIT / Tax ID" class="p-4 bg-slate-50 rounded-xl outline-none font-bold border">
                </div>
            </div>
        </div>

        <div id="modal-checkout" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-white max-w-md w-full rounded-[2.5rem] p-10 shadow-2xl relative">
                <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tight">Checkout Seguro</h2>
                <p class="text-slate-400 font-bold uppercase text-[9px] tracking-[0.2em] mb-8">Protocolo de Escrow Digital</p>
                
                <div class="space-y-4 mb-8">
                    <input type="text" id="check-rs" placeholder="Empresa Compradora" class="w-full p-4 border rounded-2xl outline-none font-bold">
                    <input type="text" id="check-dir" placeholder="Planta de Entrega" class="w-full p-4 border rounded-2xl outline-none font-bold">
                </div>

                <div class="bg-blue-800 p-6 rounded-2xl mb-8 text-white flex justify-between items-center shadow-xl">
                    <span class="font-bold text-xs uppercase tracking-tighter opacity-70">En Custodia Escrow</span>
                    <span class="text-4xl font-black" id="check-monto">$0</span>
                </div>

                <button onclick="generarLegajoProfesional()" class="w-full bg-slate-950 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all mb-4 tracking-widest">Finalizar Operación</button>
            </div>
        </div>
    </main>

    <script>
        // --- SISTEMA DE CONTROL DE DEMO ---
        let resolverPaso;

        function esperarClick() {
            return new Promise(resolve => {
                resolverPaso = resolve;
                document.getElementById('btn-continuar').onclick = () => {
                    document.getElementById('demo-guia').style.display = 'none';
                    resolve();
                };
            });
        }

        async function mostrarExplicacion(mensaje) {
            const guia = document.getElementById('demo-guia');
            const texto = document.getElementById('guia-texto');
            texto.innerText = mensaje;
            guia.style.display = 'block';
            await esperarClick();
        }

        async function escribirTexto(idElemento, texto) {
            const el = document.getElementById(idElemento);
            el.value = "";
            el.parentElement.classList.add('cursor-efecto');
            for (let i = 0; i < texto.length; i++) {
                el.value += texto[i];
                await new Promise(r => setTimeout(r, 50)); 
            }
            el.parentElement.classList.remove('cursor-efecto');
            await new Promise(r => setTimeout(r, 500)); 
        }

        function switchTab(tab) {
            const isComprar = tab === 'comprar';
            document.getElementById('view-comprar').classList.toggle('hidden', !isComprar);
            document.getElementById('view-vender').classList.toggle('hidden', isComprar);
            document.getElementById('tab-comprar').className = isComprar ? 'tab-active pb-4 text-xs uppercase' : 'pb-4 text-xs uppercase text-slate-400 font-bold';
            document.getElementById('tab-vender').className = !isComprar ? 'tab-active pb-4 text-xs uppercase' : 'pb-4 text-xs uppercase text-slate-400 font-bold';
        }

        function abrirCheckout(prod, monto) {
            window.pActual = prod;
            window.mActual = monto;
            document.getElementById('check-monto').innerText = "$" + monto;
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
        }

        function generarLegajoProfesional() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const rs = document.getElementById('check-rs').value || 'Comprador Industrial';
                const dir = document.getElementById('check-dir').value || 'Planta Logística';
                const idTrans = "NX-" + Math.floor(100000 + Math.random() * 900000);

                doc.setFillColor(30, 58, 138); 
                doc.rect(0, 0, 210, 45, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(22);
                doc.text("NEXUS AI | LEGAJO DIGITAL", 20, 25);
                doc.setFontSize(10);
                doc.text("CERTIFICADO DE OPERACIÓN B2B PROTEGIDA POR ESCROW", 20, 33);
                
                doc.setTextColor(40, 40, 40);
                doc.setFontSize(10);
                doc.text(`ID OPERACIÓN: ${idTrans}`, 140, 60);
                doc.text(`FECHA: ${new Date().toLocaleString()}`, 140, 65);
                doc.line(20, 75, 190, 75);
                
                doc.setFont("helvetica", "bold");
                doc.text("DETALLE DE TRANSACCIÓN:", 20, 85);
                doc.setFont("helvetica", "normal");
                doc.text(`Activo Industrial: ${window.pActual}`, 25, 95);
                doc.text(`Valor Neto: USD ${window.mActual}`, 25, 102);
                doc.text(`Comprador: ${rs}`, 25, 109);
                doc.text(`Destino: ${dir}`, 25, 116);
                
                doc.setFillColor(245, 247, 250);
                doc.rect(20, 130, 170, 35, 'F');
                doc.setFont("helvetica", "bold");
                doc.text("CLÁUSULA DE SEGURIDAD NEXUS:", 25, 140);
                doc.setFontSize(8);
                doc.setFont("helvetica", "normal");
                const text = "Fondos en custodia inteligente. La liberación se ejecuta tras validación de recepción mediante protocolo Nexus AI.";
                doc.text(doc.splitTextToSize(text, 160), 25, 146);
                
                doc.setFontSize(7);
                doc.setTextColor(180, 180, 180);
                doc.text(`CERTIFICADO DIGITAL SHA-256: ${Array.from({length:40}, () => Math.floor(Math.random()*16).toString(16)).join('')}`, 20, 200);

                doc.save(`Legajo_Nexus_${idTrans}.pdf`);
                cerrarCheckout();
            } catch (err) {
                alert("Error al generar PDF: " + err.message);
            }
        }

        // --- DEMO INTERACTIVA ---
        async function iniciarDemoGuiada() {
            // Paso 1
            await mostrarExplicacion("🏢 BIENVENIDO. En este paso, el Vendedor Industrial registra su empresa bajo protocolos de seguridad KYC.");
            switchTab('vender');
            await escribirTexto('vender-rs', 'Industrias Metalúrgicas Siemens Argentina');
            await escribirTexto('vender-cuit', '30-50000000-1');
            
            // Paso 2
            await mostrarExplicacion("🔍 AHORA EL COMPRADOR: Accedemos al Marketplace para localizar activos verificados por nuestra IA.");
            switchTab('comprar');
            await escribirTexto('main-search', 'Motor Siemens 5HP...');
            
            // Paso 3
            await mostrarExplicacion("🛡️ EL CHECKOUT: Se inicia la custodia de fondos. Ninguna de las partes está expuesta a riesgo de impago o falta de entrega.");
            abrirCheckout('Motor Siemens 5HP', 5000);
            await escribirTexto('check-rs', 'Aceros Metalúrgicos del Sur SRL');
            await escribirTexto('check-dir', 'Parque Industrial Pilar, Nave 45');
            
            // Paso 4
            await mostrarExplicacion("📄 PASO FINAL: Generamos el Legajo Digital. Este documento contiene el Hash de seguridad y las cláusulas de arbitraje legal.");
            generarLegajoProfesional();
            
            await mostrarExplicacion("✅ ¡DEMO FINALIZADA! El activo ha sido transaccionado y el legajo ya está en su carpeta de descargas.");
        }
    </script>
</body>
</html>
