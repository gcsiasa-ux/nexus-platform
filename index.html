<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Marketplace | B2B AI Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .tab-active { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        .card-nexus { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: 0.3s; }
        .card-nexus:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-800 rounded-xl flex items-center justify-center text-white font-black text-xl">N</div>
            <div class="text-2xl font-black tracking-tighter uppercase">Nexus<span class="text-blue-700">.Market</span></div>
        </div>
        <button onclick="iniciarDemo()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest shadow-lg transition-all active:scale-95">
            <i class="fa-solid fa-play mr-2"></i> Iniciar Demo
        </button>
    </nav>

    <div class="max-w-5xl mx-auto mt-8 flex gap-10 px-6 border-b border-slate-200">
        <button onclick="switchTab('comprar')" id="tab-comprar" class="tab-active pb-4 text-xs uppercase tracking-widest">Módulo Comprador</button>
        <button onclick="switchTab('vender')" id="tab-vender" class="pb-4 text-xs uppercase tracking-widest text-slate-400 font-bold">Módulo Vendedor</button>
    </div>

    <main class="max-w-5xl mx-auto p-6">
        
        <div id="view-comprar" class="space-y-8">
            <input type="text" id="main-search" placeholder="Buscar activos industriales..." class="w-full p-5 rounded-2xl border-none shadow-md text-lg outline-none bg-white focus:ring-2 focus:ring-blue-100">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="card-nexus p-6">
                    <div class="h-40 bg-blue-50 rounded-2xl mb-4 flex items-center justify-center text-blue-300">
                        <i class="fa-solid fa-gear text-6xl"></i>
                    </div>
                    <h3 class="font-black text-xl">Motor Siemens 5HP Industrial</h3>
                    <p class="text-xs text-slate-400 mb-6 italic">ID: NX-99283 - Verificado por Nexus AI</p>
                    <div class="flex justify-between items-center border-t pt-4">
                        <span class="text-2xl font-black">$5.000<span class="text-sm font-normal text-slate-400 ml-1">USD</span></span>
                        <button onclick="abrirCheckout('Motor Siemens 5HP', 5000)" class="bg-blue-800 text-white px-5 py-2.5 rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition-all">Comprar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-vender" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h2 class="text-lg font-black mb-6 uppercase text-blue-800 tracking-widest">Registro de Empresa</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="vender-rs" placeholder="Razón Social" class="p-4 bg-slate-50 rounded-xl outline-none font-bold focus:bg-white border focus:border-blue-200">
                    <input type="text" id="vender-cuit" placeholder="CUIT / Tax ID" class="p-4 bg-slate-50 rounded-xl outline-none font-bold focus:bg-white border focus:border-blue-200">
                </div>
            </div>
        </div>

        <div id="modal-checkout" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-white max-w-md w-full rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
                <h2 class="text-3xl font-black mb-2 text-slate-900">Checkout</h2>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-8">Protocolo de Custodia Escrow</p>
                
                <div class="space-y-4 mb-8">
                    <input type="text" id="check-rs" placeholder="Empresa Compradora" class="w-full p-4 border rounded-2xl outline-none focus:border-blue-800 font-bold">
                    <input type="text" id="check-dir" placeholder="Dirección de Planta / Entrega" class="w-full p-4 border rounded-2xl outline-none focus:border-blue-800 font-bold">
                </div>

                <div class="bg-blue-800 p-6 rounded-2xl mb-8 text-white flex justify-between items-center shadow-xl">
                    <span class="font-bold text-xs uppercase tracking-tighter">Monto a Retener</span>
                    <span class="text-4xl font-black" id="check-monto">$0</span>
                </div>

                <button onclick="generarLegajoProfesional()" class="w-full bg-slate-950 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all mb-4">Confirmar y Descargar Legajo</button>
                <button onclick="cerrarCheckout()" class="w-full text-slate-400 font-bold text-[10px] uppercase tracking-widest">Cancelar Operación</button>
            </div>
        </div>

    </main>

    <script>
        // NAVEGACIÓN
        function switchTab(tab) {
            const isComprar = tab === 'comprar';
            document.getElementById('view-comprar').classList.toggle('hidden', !isComprar);
            document.getElementById('view-vender').classList.toggle('hidden', isComprar);
            document.getElementById('tab-comprar').className = isComprar ? 'tab-active pb-4 text-xs uppercase tracking-widest' : 'pb-4 text-xs uppercase tracking-widest text-slate-400 font-bold';
            document.getElementById('tab-vender').className = !isComprar ? 'tab-active pb-4 text-xs uppercase tracking-widest' : 'pb-4 text-xs uppercase tracking-widest text-slate-400 font-bold';
        }

        function abrirCheckout(prod, monto) {
            window.pActual = prod;
            window.mActual = monto;
            document.getElementById('check-monto').innerText = "$" + monto;
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function cerrarCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
        }

        // --- LEGAJO PROFESIONAL RESTAURADO ---
        function generarLegajoProfesional() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const rs = document.getElementById('check-rs').value || 'Empresa Test B2B';
                const dir = document.getElementById('check-dir').value || 'Retiro en Planta';
                const idTrans = "NX-" + Math.floor(100000 + Math.random() * 900000);

                // Diseño: Franja Azul Superior
                doc.setFillColor(30, 58, 138); // Azul Oscuro B2B
                doc.rect(0, 0, 210, 45, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(22);
                doc.text("NEXUS AI | LEGAJO DIGITAL", 20, 25);
                doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                doc.text("TRANSACCIÓN COMERCIAL B2B PROTEGIDA POR ESCROW", 20, 33);
                
                // Cuerpo del Legajo
                doc.setTextColor(40, 40, 40);
                doc.setFontSize(10);
                doc.text(`ID OPERACIÓN: ${idTrans}`, 140, 60);
                doc.text(`FECHA: ${new Date().toLocaleString()}`, 140, 65);
                doc.line(20, 75, 190, 75);
                
                doc.setFont("helvetica", "bold");
                doc.text("DATOS DE LA TRANSACCIÓN:", 20, 85);
                doc.setFont("helvetica", "normal");
                doc.text(`Activo Industrial: ${window.pActual}`, 25, 95);
                doc.text(`Valor Neto: USD ${window.mActual}`, 25, 102);
                doc.text(`Comprador Adquirente: ${rs}`, 25, 109);
                doc.text(`Lugar de Entrega: ${dir}`, 25, 116);
                
                // Cláusula de Arbitraje
                doc.setFillColor(245, 247, 250);
                doc.rect(20, 130, 170, 35, 'F');
                doc.setFont("helvetica", "bold");
                doc.text("CLÁUSULA DE ARBITRAJE IA Y ESCROW:", 25, 140);
                doc.setFontSize(8);
                doc.setFont("helvetica", "normal");
                const text = "Los fondos se encuentran en custodia inmutable. La liberación al vendedor se procesará tras la validación de recepción del activo mediante el protocolo Nexus AI o ante resolución firme de arbitraje digital.";
                doc.text(doc.splitTextToSize(text, 160), 25, 146);
                
                // Firma Digital Ficticia
                doc.setFontSize(7);
                doc.setTextColor(180, 180, 180);
                doc.text(`HASH SHA-256 SEGURIDAD: ${Array.from({length:40}, () => Math.floor(Math.random()*16).toString(16)).join('')}`, 20, 200);

                doc.save(`Legajo_Nexus_${idTrans}.pdf`);
                alert("¡Legajo generado y descargado con éxito!");
                cerrarCheckout();
            } catch (err) {
                alert("Error al crear PDF: " + err.message);
            }
        }

        // DEMO PASO A PASO
        async function iniciarDemo() {
            alert("Iniciando Demo: Nexus automatizará el proceso por usted.");
            
            switchTab('vender');
            document.getElementById('vender-rs').value = "Siemens Argentina SA";
            document.getElementById('vender-cuit').value = "30-50000000-1";
            
            await new Promise(r => setTimeout(r, 1200));
            
            switchTab('comprar');
            document.getElementById('main-search').value = "Motor Industrial...";
            
            await new Promise(r => setTimeout(r, 1200));
            
            abrirCheckout('Motor Siemens 5HP', 5000);
            document.getElementById('check-rs').value = "Fábrica Metalúrgica Pilar";
            document.getElementById('check-dir').value = "Parque Industrial, Lote 4B";
            
            await new Promise(r => setTimeout(r, 1200));
            
            generarLegajoProfesional();
        }
    </script>
</body>
</html>
