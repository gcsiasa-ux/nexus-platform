<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Marketplace | B2B AI Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; overflow-x: hidden; }
        .tab-active { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: bold; }
        .hidden { display: none; }
        .card-nexus { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; transition: 0.3s; }
        .cursor-efecto::after { content: '|'; animation: parpadeo 0.7s infinite; color: #2563eb; margin-left: 2px; }
        @keyframes parpadeo { 50% { opacity: 0; } }
        
        #demo-guia {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200; background: #1e293b; color: white; padding: 30px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border-left: 8px solid #fbbf24;
            display: none; max-width: 450px; width: 90%; text-align: center;
        }
    </style>
</head>
<body class="text-slate-900">

    <div id="demo-guia">
        <div class="mb-6">
            <i class="fa-solid fa-layer-group text-amber-400 text-3xl mb-3"></i>
            <p id="guia-texto" class="font-bold text-lg leading-relaxed"></p>
        </div>
        <button id="btn-continuar" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-black uppercase text-xs tracking-widest transition-all">
            Continuar Presentación <i class="fa-solid fa-chevron-right ml-2"></i>
        </button>
    </div>

    <nav class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-800 rounded-xl flex items-center justify-center text-white font-black text-xl">N</div>
            <div class="text-2xl font-black tracking-tighter uppercase">Nexus<span class="text-blue-700">.Market</span></div>
        </div>
        <button onclick="iniciarDemoCompleta()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-xs font-black uppercase tracking-widest shadow-lg transition-all active:scale-95">
            <i class="fa-solid fa-play mr-2"></i> Iniciar Demo Interactiva
        </button>
    </nav>

    <div class="max-w-5xl mx-auto mt-8 flex gap-10 px-6 border-b border-slate-200">
        <button onclick="switchTab('vender')" id="tab-vender" class="pb-4 text-xs uppercase tracking-widest text-slate-400 font-bold transition-all">Perfil Vendedor</button>
        <button onclick="switchTab('comprar')" id="tab-comprar" class="pb-4 text-xs uppercase tracking-widest text-slate-400 font-bold transition-all">Portal Comprador</button>
    </div>

    <main class="max-w-5xl mx-auto p-6">
        
        <div id="view-vender" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h2 class="text-lg font-black mb-6 uppercase text-blue-800 tracking-widest">1. Registro e Identidad Fiscal</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="vender-rs" placeholder="Razón Social" class="p-4 bg-slate-50 rounded-xl outline-none font-bold border">
                    <input type="text" id="vender-cuit" placeholder="CUIT / Tax ID" class="p-4 bg-slate-50 rounded-xl outline-none font-bold border">
                </div>
            </div>
            <div id="vender-docs" class="bg-white p-8 rounded-3xl border shadow-sm opacity-50 transition-all">
                <h2 class="text-lg font-black mb-4 uppercase text-slate-800">2. Documentación Técnica del Activo</h2>
                <div class="flex items-center gap-4 p-4 border-2 border-dashed border-slate-200 rounded-2xl">
                    <i class="fa-solid fa-file-pdf text-3xl text-slate-300" id="icon-doc"></i>
                    <p class="text-sm font-bold text-slate-400" id="text-doc">Esperando carga de Manuales/Planos...</p>
                </div>
            </div>
        </div>

        <div id="view-comprar" class="hidden space-y-8">
            <div class="relative">
                <input type="text" id="main-search" placeholder="Buscar por categoría, marca o ID de activo..." class="w-full p-5 rounded-2xl border-none shadow-md text-lg outline-none bg-white">
                <div id="ai-rating" class="absolute right-4 top-1/2 -translate-y-1/2 hidden bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-black uppercase tracking-tighter">
                    <i class="fa-solid fa-check-double mr-1"></i> AI Trust: 98.4%
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card-nexus p-6">
                    <div class="h-40 bg-blue-50 rounded-2xl mb-4 flex items-center justify-center text-blue-400">
                        <i class="fa-solid fa-industry text-6xl"></i>
                    </div>
                    <h3 class="font-black text-xl">Motor Siemens 5HP Industrial</h3>
                    <p class="text-[10px] text-slate-400 mb-6 uppercase font-black tracking-widest">Verificado: Inmutable</p>
                    <div class="flex justify-between items-center border-t pt-4">
                        <span class="text-2xl font-black">$5.000</span>
                        <button onclick="abrirCheckout('Motor Siemens 5HP', 5000)" class="bg-blue-800 text-white px-5 py-2.5 rounded-xl font-black text-xs uppercase shadow-md active:scale-95 transition-all">Comprar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="modal-checkout" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-white max-w-md w-full rounded-[2.5rem] p-10 shadow-2xl relative">
                <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tight">Escrow Seguro</h2>
                <p class="text-slate-400 font-bold uppercase text-[9px] tracking-[0.2em] mb-8">Arbitraje Digital Nexus</p>
                <div class="space-y-4 mb-8">
                    <input type="text" id="check-rs" placeholder="Empresa Compradora" class="w-full p-4 border rounded-2xl outline-none font-bold">
                    <input type="text" id="check-dir" placeholder="Planta de Destino" class="w-full p-4 border rounded-2xl outline-none font-bold">
                </div>
                <div class="bg-blue-800 p-6 rounded-2xl mb-8 text-white flex justify-between items-center shadow-xl">
                    <span class="font-bold text-xs uppercase opacity-70">Total Protegido</span>
                    <span class="text-4xl font-black" id="check-monto">$0</span>
                </div>
                <button onclick="generarLegajoProfesional()" class="w-full bg-slate-950 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all mb-4">Cerrar Operación</button>
            </div>
        </div>
    </main>

    <script>
        let resolverPaso;
        function esperarClick() {
            return new Promise(resolve => {
                resolverPaso = resolve;
                document.getElementById('btn-continuar').onclick = () => {
                    document.getElementById('demo-guia').style.display = 'none';
                    resolve();
                };
            });
        }

        async function mostrarExplicacion(mensaje) {
            const guia = document.getElementById('demo-guia');
            const texto = document.getElementById('guia-texto');
            texto.innerText = mensaje;
            guia.style.display = 'block';
            await esperarClick();
        }

        async function escribirTexto(idElemento, texto) {
            const el = document.getElementById(idElemento);
            el.value = "";
            el.parentElement.classList.add('cursor-efecto');
            for (let i = 0; i < texto.length; i++) {
                el.value += texto[i];
                await new Promise(r => setTimeout(r, 45)); 
            }
            el.parentElement.classList.remove('cursor-efecto');
            await new Promise(r => setTimeout(r, 400)); 
        }

        function switchTab(tab) {
            const isComprar = tab === 'comprar';
            document.getElementById('view-comprar').classList.toggle('hidden', !isComprar);
            document.getElementById('view-vender').classList.toggle('hidden', isComprar);
            document.getElementById('tab-comprar').className = isComprar ? 'tab-active pb-4 text-xs uppercase' : 'pb-4 text-xs uppercase text-slate-400 font-bold transition-all';
            document.getElementById('tab-vender').className = !isComprar ? 'tab-active pb-4 text-xs uppercase' : 'pb-4 text-xs uppercase text-slate-400 font-bold transition-all';
        }

        function abrirCheckout(prod, monto) {
            window.pActual = prod;
            window.mActual = monto;
            document.getElementById('check-monto').innerText = "$" + monto;
            document.getElementById('modal-checkout').classList.remove('hidden');
        }

        function generarLegajoProfesional() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const rs = document.getElementById('check-rs').value || 'Empresa Compradora B2B';
                const dir = document.getElementById('check-dir').value || 'Planta Industrial';
                const idTrans = "NX-" + Math.floor(100000 + Math.random() * 900000);

                doc.setFillColor(30, 58, 138); doc.rect(0, 0, 210, 45, 'F');
                doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
                doc.text("NEXUS AI | LEGAJO DIGITAL", 20, 25);
                doc.setFontSize(10); doc.text("PROTOCOLO DE SEGURIDAD INMUTABLE", 20, 33);
                
                doc.setTextColor(40, 40, 40); doc.setFontSize(10);
                doc.text(`ID OPERACIÓN: ${idTrans}`, 140, 60);
                doc.text(`FECHA: ${new Date().toLocaleString()}`, 140, 65);
                doc.line(20, 75, 190, 75);
                
                doc.setFont("helvetica", "bold"); doc.text("RESUMEN DE OPERACIÓN:", 20, 85);
                doc.setFont("helvetica", "normal");
                doc.text(`Activo Industrial: ${window.pActual}`, 25, 95);
                doc.text(`Valor Neto: USD ${window.mActual}`, 25, 102);
                doc.text(`Comprador: ${rs}`, 25, 109);
                doc.text(`Destino: ${dir}`, 25, 116);
                
                doc.setFillColor(245, 247, 250); doc.rect(20, 130, 170, 35, 'F');
                doc.setFont("helvetica", "bold"); doc.text("CERTIFICADO DE ARBITRAJE:", 25, 140);
                doc.setFontSize(8); doc.text("Fondos en custodia. La liberación se procesa tras validación técnica de Nexus AI.", 25, 146);
                
                doc.setFontSize(7); doc.setTextColor(180, 180, 180);
                doc.text(`HASH SHA-256: ${Array.from({length:40}, () => Math.floor(Math.random()*16).toString(16)).join('')}`, 20, 200);

                doc.save(`Legajo_Nexus_${idTrans}.pdf`);
                document.getElementById('modal-checkout').classList.add('hidden');
            } catch (err) { alert("Error PDF: " + err.message); }
        }

        // --- DEMO COMPLETA Y EXPANDIDA ---
        async function iniciarDemoCompleta() {
            // Paso 1: Registro Vendedor
            await mostrarExplicacion("🏢 PASO 1: El vendedor registra su identidad fiscal para garantizar la legalidad de la oferta.");
            switchTab('vender');
            await escribirTexto('vender-rs', 'Industrias Metalúrgicas Siemens Argentina');
            await escribirTexto('vender-cuit', '30-50000000-1');
            
            // Paso 2: Carga de Documentos (NUEVO)
            await mostrarExplicacion("📄 PASO 2: Se carga la documentación técnica del motor (Planos, Manuales y Garantías) para el Due Diligence del comprador.");
            document.getElementById('vender-docs').classList.remove('opacity-50');
            document.getElementById('icon-doc').classList.replace('text-slate-300', 'text-red-500');
            document.getElementById('text-doc').innerText = "Manual_Siemens_5HP_v2026.pdf (Cargado)";
            document.getElementById('text-doc').classList.replace('text-slate-400', 'text-slate-800');

            // Paso 3: Búsqueda
            await mostrarExplicacion("🔍 PASO 3: Un comprador industrial busca activos específicos en el marketplace.");
            switchTab('comprar');
            await escribirTexto('main-search', 'Motor Siemens 5HP...');

            // Paso 4: AI Rating (NUEVO)
            await mostrarExplicacion("🤖 PASO 4: Nuestra IA evalúa el historial del vendedor y la veracidad de los documentos cargados, asignando un puntaje de confianza.");
            document.getElementById('ai-rating').classList.remove('hidden');
            
            // Paso 5: Checkout
            await mostrarExplicacion("🛡️ PASO 5: Se inicia la custodia de fondos (Escrow). Nexus protege la inversión hasta que el activo llegue a planta.");
            abrirCheckout('Motor Siemens 5HP', 5000);
            await escribirTexto('check-rs', 'Fábrica de Aceros Metalúrgicos SRL');
            await escribirTexto('check-dir', 'Parque Industrial Pilar, Nave 12');
            
            // Paso 6: Cierre
            await mostrarExplicacion("📄 PASO FINAL: Generamos el Legajo Digital Profesional que sirve como contrato inteligente de la operación.");
            generarLegajoProfesional();
            
            await mostrarExplicacion("✅ ¡DEMO FINALIZADA! Presentación completa del ciclo Nexus.");
        }
    </script>
</body>
</html>
