<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Marketplace | B2B AI Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 900; }
        .card-nexus { background: white; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .motor-svg { background-color: #eff6ff; height: 150px; border-radius: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="text-slate-900 font-sans">

    <nav class="p-4 bg-white border-b border-slate-200 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl">N</div>
            <div class="text-2xl font-black tracking-tighter text-slate-800 uppercase">Nexus<span class="text-blue-600">.Market</span></div>
        </div>
        <button onclick="iniciarDemoCompleta()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded-full text-xs font-black uppercase shadow-lg">
            <i class="fa-solid fa-play"></i> Iniciar Modo DEMO
        </button>
    </nav>

    <div class="max-w-6xl mx-auto mt-6 flex gap-8 px-6 border-b border-slate-200">
        <button onclick="switchTab('comprar')" id="tab-comprar" class="tab-active pb-4 text-sm uppercase">Módulo Comprador</button>
        <button onclick="switchTab('vender')" id="tab-vender" class="pb-4 text-sm uppercase text-slate-400">Módulo Vendedor</button>
    </div>

    <main class="max-w-6xl mx-auto p-6">
        <div id="view-comprar" class="space-y-8">
            <input type="text" id="main-search" placeholder="Buscar productos..." class="w-full p-6 rounded-2xl shadow-xl text-lg outline-none bg-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="card-nexus p-6 rounded-3xl">
                    <div class="motor-svg flex items-center justify-center"><i class="fa-solid fa-gears text-5xl text-blue-300"></i></div>
                    <h3 class="font-black text-xl">Motor Siemens 5HP Industrial</h3>
                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-3xl font-black">$5.000</span>
                        <button onclick="showCheckout('Motor Siemens 5HP', 5000)" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-black uppercase text-xs">Comprar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-vender" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-3xl border border-slate-200">
                <input type="text" id="demo-rs" placeholder="Razón Social" class="w-full bg-slate-50 p-4 rounded-xl mb-4">
                <input type="text" id="demo-cuit" placeholder="CUIT" class="w-full bg-slate-50 p-4 rounded-xl">
            </div>
        </div>

        <div id="modal-checkout" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-white max-w-xl w-full rounded-3xl p-8 shadow-2xl">
                <h2 class="text-2xl font-bold mb-6">Finalizar Compra</h2>
                <input type="text" id="checkout-rs" placeholder="Nombre Comprador" class="w-full border p-4 rounded-xl mb-4">
                <input type="text" id="checkout-dir" placeholder="Dirección de entrega" class="w-full border p-4 rounded-xl mb-6">
                <div class="bg-blue-600 p-6 rounded-2xl mb-8 text-white flex justify-between">
                    <span class="font-bold">Total Escrow:</span>
                    <span class="font-black text-2xl" id="checkout-monto">$0</span>
                </div>
                <button onclick="ejecutarCompraFinal()" class="w-full bg-slate-950 text-white py-5 rounded-2xl font-black uppercase">Confirmar Operación</button>
                <button onclick="closeCheckout()" class="w-full text-slate-400 mt-4 text-xs font-bold uppercase">Cancelar</button>
            </div>
        </div>
    </main>

    <script>
        function switchTab(tab) {
            document.getElementById('view-comprar').classList.toggle('hidden', tab !== 'comprar');
            document.getElementById('view-vender').classList.toggle('hidden', tab !== 'vender');
            document.getElementById('tab-comprar').className = tab === 'comprar' ? 'tab-active pb-4 text-sm' : 'pb-4 text-sm text-slate-400';
            document.getElementById('tab-vender').className = tab === 'vender' ? 'tab-active pb-4 text-sm' : 'pb-4 text-sm text-slate-400';
        }

        function showCheckout(prod, monto) {
            document.getElementById('modal-checkout').classList.remove('hidden');
            document.getElementById('checkout-monto').innerText = "$" + monto;
            window.currentProd = prod;
            window.currentMonto = monto;
        }

        function closeCheckout() {
            document.getElementById('modal-checkout').classList.add('hidden');
        }

        // FUNCIÓN DE PDF BLINDADA
        async function ejecutarCompraFinal() {
            try {
                const { jsPDF } = window.jspdf;
                if (!jsPDF) throw new Error("La librería PDF no cargó correctamente.");

                const doc = new jsPDF();
                const idTrans = "NX-" + Math.floor(Math.random() * 1000000);
                
                // Diseño simplificado pero profesional para asegurar compatibilidad
                doc.setFillColor(37, 99, 235);
                doc.rect(0, 0, 210, 40, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(20);
                doc.text("NEXUS AI | LEGAJO DIGITAL", 20, 25);
                
                doc.setTextColor(40, 40, 40);
                doc.setFontSize(12);
                doc.text(`ID: ${idTrans}`, 20, 60);
                doc.text(`Producto: ${window.currentProd}`, 20, 70);
                doc.text(`Monto: USD ${window.currentMonto}`, 20, 80);
                doc.text(`Comprador: ${document.getElementById('checkout-rs').value || 'Demo User'}`, 20, 90);
                doc.text(`Destino: ${document.getElementById('checkout-dir').value || 'A definir'}`, 20, 100);
                
                doc.setFontSize(8);
                doc.text("Estado: FONDOS PROTEGIDOS POR ALGORITMO NEXUS ESCROW", 20, 150);

                doc.save(`Nexus_Legajo_${idTrans}.pdf`);
                alert("¡Legajo Generado con éxito!");
                closeCheckout();
            } catch (err) {
                console.error(err);
                alert("Error al generar PDF: " + err.message + ". Verificá si el navegador bloqueó la descarga.");
            }
        }

        async function iniciarDemoCompleta() {
            switchTab('vender');
            document.getElementById('demo-rs').value = "Siemens SA";
            document.getElementById('demo-cuit').value = "30-500000-1";
            
            setTimeout(() => {
                switchTab('comprar');
                document.getElementById('main-search').value = "Motor Siemens...";
                setTimeout(() => {
                    showCheckout('Motor Siemens 5HP', 5000);
                    document.getElementById('checkout-rs').value = "Industria Argentina SRL";
                    document.getElementById('checkout-dir').value = "Calle Falsa 123, BA";
                }, 1000);
            }, 1000);
        }
    </script>
</body>
</html>
